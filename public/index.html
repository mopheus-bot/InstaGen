<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Mobile-first viewport with safe-area support so the UI looks
      like a native app when "Added to Home Screen" on iOS/Android.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="InstaGen Theme Hub — pick a faceless channel engine to generate today's content." />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InstaGen" />
    <meta name="format-detection" content="telephone=no" />

    <title>InstaGen — Theme Hub</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0a'/%3E%3Ctext x='50' y='66' font-family='-apple-system,sans-serif' font-size='52' font-weight='700' fill='white' text-anchor='middle'%3EI%3C/text%3E%3C/svg%3E" />

    <style>
      /* ----------------------------------------------------------------- */
      /* Design tokens                                                       */
      /* ----------------------------------------------------------------- */
      :root {
        --bg: #0a0a0a;
        --bg-elev: #141414;
        --bg-card: #1a1a1a;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f5f5f5;
        --text-dim: #a0a0a0;
        --text-faint: #6a6a6a;
        --accent: #ffffff;
        --radius: 16px;
        --radius-sm: 10px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto,
          "Helvetica Neue", Arial, sans-serif;
        --font-serif: "New York", "Iowan Old Style", "Apple Garamond", Georgia,
          "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: contain;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        /* Respect the iOS notch / Android nav bar */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ----------------------------------------------------------------- */
      /* Layout                                                              */
      /* ----------------------------------------------------------------- */
      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }

      /* ----------------------------------------------------------------- */
      /* Header                                                              */
      /* ----------------------------------------------------------------- */
      .hub-header {
        text-align: center;
        padding: 8px 0 36px;
      }

      .hub-eyebrow {
        display: inline-block;
        margin: 0 0 14px;
        padding: 6px 12px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .hub-title {
        font-family: var(--font-serif);
        font-size: clamp(32px, 6.5vw, 48px);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 10px;
        line-height: 1.05;
      }

      .hub-subtitle {
        margin: 0 auto;
        max-width: 560px;
        color: var(--text-dim);
        font-size: 15px;
        line-height: 1.5;
        letter-spacing: 0.01em;
      }

      .hub-subtitle strong {
        color: var(--text);
        font-weight: 500;
      }

      /* ----------------------------------------------------------------- */
      /* Niche grid                                                          */
      /* ----------------------------------------------------------------- */
      .niche-grid {
        margin-top: 28px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      @media (min-width: 640px) {
        .niche-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 18px;
        }
      }

      @media (min-width: 960px) {
        .niche-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 20px;
        }
      }

      @media (min-width: 1200px) {
        .niche-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* ----------------------------------------------------------------- */
      /* Niche card                                                          */
      /* ----------------------------------------------------------------- */
      .niche-card {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        min-height: 200px;
        padding: 22px 22px 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        color: inherit;
        /* Layered transitions: hover lift, click pulse, route-leave scale. */
        transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    border-color 220ms ease,
                    box-shadow 220ms ease;
        will-change: transform, opacity;
      }

      .niche-card::before {
        /* Per-niche gradient overlay (set as a custom property in JS/HTML). */
        content: "";
        position: absolute;
        inset: 0;
        background: var(--niche-gradient, linear-gradient(135deg, #2a2a2a, #1a1a1a));
        opacity: 0.85;
        z-index: 0;
        transition: opacity 220ms ease, transform 320ms ease;
      }

      .niche-card::after {
        /* Subtle grain texture so the gradient doesn't look like flat CSS. */
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.08), transparent 50%),
          radial-gradient(circle at 80% 90%, rgba(0, 0, 0, 0.4), transparent 60%);
        z-index: 1;
        pointer-events: none;
      }

      .niche-card:hover {
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, 0.18);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      }

      .niche-card:hover::before {
        opacity: 1;
        transform: scale(1.04);
      }

      .niche-card:active {
        transform: translateY(-1px) scale(0.99);
      }

      /* Leaving-state animation triggered by JS before navigation. */
      .niche-card.is-leaving {
        animation: niche-leave 360ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        pointer-events: none;
      }

      @keyframes niche-leave {
        0%   { transform: scale(1);   opacity: 1; }
        40%  { transform: scale(1.04); opacity: 1; }
        100% { transform: scale(0.96); opacity: 0; }
      }

      .niche-card__inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .niche-card__icon {
        width: 38px;
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 12px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #fff;
        margin-bottom: 6px;
      }

      .niche-card__icon svg {
        width: 20px;
        height: 20px;
      }

      .niche-card__title {
        font-family: var(--font-serif);
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.01em;
        margin: 0;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      }

      .niche-card__tag {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
      }

      .niche-card__cta {
        margin-top: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .niche-card:hover .niche-card__cta {
        opacity: 1;
        transform: translateX(0);
      }

      .niche-card__cta svg {
        width: 14px;
        height: 14px;
      }

      /* ----------------------------------------------------------------- */
      /* Footer                                                              */
      /* ----------------------------------------------------------------- */
      .hub-footer {
        margin-top: 40px;
        text-align: center;
        font-size: 12px;
        color: var(--text-faint);
        letter-spacing: 0.04em;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hub-header">
        <span class="hub-eyebrow">Theme Hub</span>
        <h1 class="hub-title">Choose your channel</h1>
        <p class="hub-subtitle">
          Seven faceless engines. Each one generates a daily
          <strong>8-slide carousel</strong> tuned to its niche, ready for Instagram.
        </p>
      </header>

      <!-- Niche grid: 7 engines. The order and labels are the product surface;
           keep them stable — /generator reads the active niche from the same
           id and passes it to /api/generate-content. -->
      <section class="niche-grid" id="niche-grid" aria-label="Available niches">
        <!-- Cards are rendered by hub.js so we can keep the niche registry
             (id, label, gradient, icon) in one place. -->
      </section>

      <footer class="hub-footer">
        InstaGen · Pick a niche to start today's run
      </footer>
    </main>

    <script type="module" src="/hub.js"></script>
  </body>
</html>
